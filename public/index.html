<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- The app entry is editor.html (shared with the extension build). This tiny
         redirect makes the site root (e.g. GitHub Pages …/notepad-web/) open the
         editor instead of 404-ing. Relative URL works under any sub-path. -->
    <meta http-equiv="refresh" content="0; url=./editor.html" />
    <link rel="canonical" href="./editor.html" />
    <title>Notepad Web</title>
  </head>
  <body>
    <p>Redirecting to <a href="./editor.html">Notepad Web</a>…</p>
  </body>
</html>
