name: '[Bug] Bug report'
description: Report something that is broken or behaving unexpectedly.
title: '[Bug] '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the fields below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps to reliably reproduce the issue.
      placeholder: |
        1. Open the extension
        2. Open a file
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error messages or console output.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Extension version
      description: Found in chrome://extensions next to NotePad Web.
      placeholder: '0.1.0'
    validations:
      required: true

  - type: input
    id: chrome
    attributes:
      label: Chrome version
      description: Found in chrome://settings/help.
      placeholder: '130.0.0.0'
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, file types, OS, or anything else relevant.
    validations:
      required: false
